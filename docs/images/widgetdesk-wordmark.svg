<svg width="960" height="260" viewBox="0 0 960 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WidgetDesk</title>
  <desc id="desc">A pixel mosaic wordmark for WidgetDesk.</desc>
  <defs>
    <linearGradient id="titleGradient" x1="160" y1="56" x2="808" y2="202" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8FF7E8"/>
      <stop offset="0.36" stop-color="#7CB7FF"/>
      <stop offset="0.68" stop-color="#D7A7FF"/>
      <stop offset="1" stop-color="#FFE48A"/>
    </linearGradient>
    <linearGradient id="panelGradient" x1="120" y1="28" x2="840" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1D3442"/>
      <stop offset="1" stop-color="#0D141B"/>
    </linearGradient>
    <filter id="softShadow" x="82" y="18" width="796" height="224" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#071017" flood-opacity="0.26"/>
    </filter>
  </defs>

  <rect width="960" height="260" fill="transparent"/>

  <g opacity="0.82">
    <rect x="98" y="66" width="10" height="10" rx="3" fill="#8FF7E8"/>
    <rect x="124" y="40" width="8" height="8" rx="2.5" fill="#7CB7FF"/>
    <rect x="150" y="84" width="12" height="12" rx="3" fill="#FFE48A"/>
    <rect x="784" y="42" width="10" height="10" rx="3" fill="#D7A7FF"/>
    <rect x="824" y="74" width="12" height="12" rx="3" fill="#8FF7E8"/>
    <rect x="860" y="124" width="8" height="8" rx="2.5" fill="#FFE48A"/>
    <rect x="92" y="170" width="8" height="8" rx="2.5" fill="#D7A7FF"/>
    <rect x="842" y="184" width="10" height="10" rx="3" fill="#7CB7FF"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="120" y="38" width="720" height="184" rx="42" fill="url(#panelGradient)"/>
    <rect x="122" y="40" width="716" height="180" rx="40" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="4"/>
  </g>

  <g opacity="0.35">
    <rect x="168" y="76" width="12" height="12" rx="3" fill="#8FF7E8"/>
    <rect x="190" y="76" width="12" height="12" rx="3" fill="#7CB7FF"/>
    <rect x="212" y="76" width="12" height="12" rx="3" fill="#D7A7FF"/>
    <rect x="736" y="172" width="12" height="12" rx="3" fill="#FFE48A"/>
    <rect x="758" y="172" width="12" height="12" rx="3" fill="#8FF7E8"/>
    <rect x="780" y="172" width="12" height="12" rx="3" fill="#7CB7FF"/>
  </g>

  <text x="480" y="147" text-anchor="middle"
        font-family="SF Pro Display, Inter, Avenir Next, Helvetica Neue, Arial, sans-serif"
        font-size="76" font-weight="800" letter-spacing="0"
        fill="url(#titleGradient)">WidgetDesk</text>

  <text x="480" y="182" text-anchor="middle"
        font-family="SF Pro Text, Inter, Helvetica Neue, Arial, sans-serif"
        font-size="18" font-weight="600" letter-spacing="2.8"
        fill="#D7FFF7" opacity="0.72">NATIVE MACOS DESKTOP WIDGETS</text>
</svg>
