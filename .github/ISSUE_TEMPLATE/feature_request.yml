name: Feature request
description: Suggest an improvement or new WidgetDesk workflow.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that WidgetDesk does not handle well yet?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would a good solution look like?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Any other approaches you considered?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - macOS host
        - Widget generation
        - Built-in templates
        - Developer CLI
        - Packaging and releases
        - Documentation
